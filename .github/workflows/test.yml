name: Tests

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  lambda-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test deps
        run: pip install pytest

      - name: Run Lambda unit tests
        run: python -m pytest lambda/test_handler.py -v --tb=short

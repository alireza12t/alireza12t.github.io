name: Add Holiday

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD)"
        required: true
      end_date:
        description: "End date inclusive (YYYY-MM-DD)"
        required: true

permissions:
  contents: write

jobs:
  block:
    runs-on: ubuntu-latest
    if: github.actor == github.repository_owner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Block holiday dates
        run: python scripts/add_holiday.py "${{ inputs.start_date }}" "${{ inputs.end_date }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add availabilities.json
          git diff --staged --quiet || git commit -m "chore: block holiday ${{ inputs.start_date }} to ${{ inputs.end_date }} [skip ci]"
          git push
